<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 310" width="420" height="310">
  <defs>
    <linearGradient id="blue-grad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#1A4A7A"/>
    </linearGradient>
    <linearGradient id="orange-grad" x1="0.7" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#D4792A"/>
    </linearGradient>
    <clipPath id="left-half">
      <rect x="0" y="0" width="210" height="310"/>
    </clipPath>
    <clipPath id="right-half">
      <rect x="210" y="0" width="210" height="310"/>
    </clipPath>
    <clipPath id="oval-clip">
      <ellipse cx="210" cy="155" rx="200" ry="148"/>
    </clipPath>
  </defs>

  <!-- Oval: blue left, gold right -->
  <g clip-path="url(#oval-clip)">
    <g clip-path="url(#left-half)">
      <rect x="0" y="0" width="420" height="310" fill="url(#blue-grad)"/>
    </g>
    <g clip-path="url(#right-half)">
      <rect x="0" y="0" width="420" height="310" fill="url(#orange-grad)"/>
    </g>
    <!-- White center divider -->
    <line x1="210" y1="7" x2="210" y2="303" stroke="white" stroke-width="6"/>
    <!-- Cross — centered in left half (cx=105, cy=155) -->
    <rect x="91" y="72" width="28" height="166" rx="3" fill="white"/>
    <rect x="48" y="115" width="115" height="28" rx="3" fill="white"/>
    <!-- Order of worship lines — right half (cx=315, cy=155) -->
    <circle cx="248" cy="110" r="7" fill="white" opacity="1"/>
    <rect x="264" y="103" width="95" height="14" rx="7" fill="white" opacity="1"/>
    <circle cx="248" cy="150" r="7" fill="white" opacity="0.82"/>
    <rect x="264" y="143" width="74" height="14" rx="7" fill="white" opacity="0.82"/>
    <circle cx="248" cy="190" r="7" fill="white" opacity="0.62"/>
    <rect x="264" y="183" width="84" height="14" rx="7" fill="white" opacity="0.62"/>
    <circle cx="248" cy="230" r="7" fill="white" opacity="0.38"/>
    <rect x="264" y="223" width="60" height="14" rx="7" fill="white" opacity="0.38"/>
  </g>

  <!-- Oval outline -->
  <ellipse cx="210" cy="155" rx="200" ry="148" fill="none" stroke="white" stroke-width="4"/>
</svg>
